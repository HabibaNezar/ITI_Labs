<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task 3</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        #targetText {
            padding: 10px;
            margin-bottom: 30px;
            width: 80%;
            height: 100px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 14px;
        }

        th, td {
            border: 1px solid #999;
            padding: 8px;
            vertical-align: top;
            text-align: left;
        }

        th {
            background-color: #f0f0f0;
            font-weight: bold;
        }

        label {
            display: block;
            margin-bottom: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <p id="targetText">
        Here is a paragraph of text that has various alignment characteristics that can be changed dynamically. Click the radio buttons below to view combinations of text style settings.
    </p>

    <form id="styleForm">
        <table>
            <thead>
                <tr>
                    <th>fontFamily</th>
                    <th>textAlign</th>
                    <th>lineHeight</th>
                    <th>letterSpacing</th>
                    <th>textIndent</th>
                    <th>textTransform</th>
                    <th>textDecoration</th>
                    <th>textBorder</th>
                    <th>Bordercolor</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <label><input type="radio" name="fontFamily" value="arial" checked> Arial</label>
                        <label><input type="radio" name="fontFamily" value="courier"> Courier</label>
                        <label><input type="radio" name="fontFamily" value="georgia"> Georgia</label>
                        <label><input type="radio" name="fontFamily" value="impact"> Impact</label>
                        <label><input type="radio" name="fontFamily" value="times new roman"> Times New Roman</label>
                        <label><input type="radio" name="fontFamily" value="verdana"> Verdana</label>
                    </td>

                    <td>
                        <label><input type="radio" name="textAlign" value="left" checked> left</label>
                        <label><input type="radio" name="textAlign" value="center"> center</label>
                        <label><input type="radio" name="textAlign" value="right"> right</label>
                        <label><input type="radio" name="textAlign" value="justify"> justify</label>
                    </td>

                    <td>
                        <label><input type="radio" name="lineHeight" value="normal" checked> normal</label>
                        <label><input type="radio" name="lineHeight" value="10px"> 10px</label>
                        <label><input type="radio" name="lineHeight" value="15px"> 15px</label>
                        <label><input type="radio" name="lineHeight" value="1.5"> 1.5</label>
                    </td>

                    <td>
                        <label><input type="radio" name="letterSpacing" value="normal" checked> normal</label>
                        <label><input type="radio" name="letterSpacing" value="-1px"> -1px</label>
                        <label><input type="radio" name="letterSpacing" value="2px"> 2px</label>
                        <label><input type="radio" name="letterSpacing" value="3px"> 3px</label>
                    </td>

                    <td>
                        <label><input type="radio" name="textIndent" value="0px" checked> 0px</label>
                        <label><input type="radio" name="textIndent" value="5px"> 5px</label>
                        <label><input type="radio" name="textIndent" value="15px"> 15px</label>
                        <label><input type="radio" name="textIndent" value="25px"> 25px</label>
                    </td>

                    <td>
                        <label><input type="radio" name="textTransform" value="none" checked> none</label>
                        <label><input type="radio" name="textTransform" value="capitalize"> capitalize</label>
                        <label><input type="radio" name="textTransform" value="uppercase"> uppercase</label>
                        <label><input type="radio" name="textTransform" value="lowercase"> lowercase</label>
                    </td>

                    <td>
                        <label><input type="radio" name="textDecoration" value="none" checked> none</label>
                        <label><input type="radio" name="textDecoration" value="line-through"> line-through</label>
                        <label><input type="radio" name="textDecoration" value="overline"> overline</label>
                        <label><input type="radio" name="textDecoration" value="underline"> underline</label>
                    </td>

                    <td>
                        <label><input type="radio" name="borderStyle" value="none" checked> none</label>
                        <label><input type="radio" name="borderStyle" value="dotted"> dotted</label>
                        <label><input type="radio" name="borderStyle" value="double"> double</label>
                        <label><input type="radio" name="borderStyle" value="groove"> groove</label>
                        <label><input type="radio" name="borderStyle" value="dashed"> dashed</label>
                        <label><input type="radio" name="borderStyle" value="inset"> inset</label>
                        <label><input type="radio" name="borderStyle" value="solid"> solid</label>
                        <label><input type="radio" name="borderStyle" value="outset"> outset</label>
                        <label><input type="radio" name="borderStyle" value="ridge"> ridge</label>
                    </td>

                    <td>
                        <label><input type="radio" name="borderColor" value="none" checked> none</label>
                        <label><input type="radio" name="borderColor" value="pink"> pink</label>
                        <label><input type="radio" name="borderColor" value="red"> red</label>
                        <label><input type="radio" name="borderColor" value="green"> green</label>
                        <label><input type="radio" name="borderColor" value="blue"> blue</label>
                        <label><input type="radio" name="borderColor" value="yellow"> yellow</label>
                        <label><input type="radio" name="borderColor" value="purple"> purple</label>
                    </td>
                </tr>
            </tbody>
        </table>
    </form>

    <script>
        const targetText = document.getElementById("targetText");
        const radios = document.querySelectorAll('input[type="radio"]');

        radios.forEach(radio => {
            radio.addEventListener('change', function() {
                const property = this.name;
                const value = this.value;
                targetText.style[property] = value;
            });
        });
    </script>

</body>
</html>
