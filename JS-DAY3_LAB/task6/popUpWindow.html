
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <img id="genderImg" width="150">
    <h3 id="welcome"></h3>

    <script>
        var query = window.location.search.substring(1);
        var data = query.split("&");

        var name = data[0].split("=")[1];
        var color = data[1].split("=")[1];
        var gender = data[2].split("=")[1];

        document.getElementById("welcome").innerHTML =
            "Welcome <span style='color:" + color + ";'>" + name + "</span>;"


        var img = document.getElementById("genderImg");
        if (gender === "male") {
            img.src = "./male.png";
        } else {
            img.src = "./female.png";
        }
    </script>
</body>

</html>
