<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task 1</title>
    
</head>
<body>
    <h1>Heading</h1>
    <hr>
    <div id="result"></div>

    <script>
        var userInput = prompt("Enter message")
        var output = ""
        for(var i=1 ; i<=6 ; i++){
            output += "<h" + i + ">" + userInput + "<h" + i +"/>" 
        }

        document.getElementById("result").innerHTML = output;
    </script>
</body>
