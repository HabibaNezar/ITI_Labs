<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>

    <div id="result">

    </div>

    <script>
        for(var i=0 ; i<4 ; i++){

            document.getElementById("result").innerHTML += number.toFixed(7) + "<br>" 
        }
    </script>
