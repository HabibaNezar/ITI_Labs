<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>canvas2</title>
    <style>
      body {
        overflow: hidden;
      }
    </style>
    <script>
      let mycanvas;
      let mycontext;
      let isdrawable = false;
      window.addEventListener("load", doitfirst);
      function doitfirst() {
        mycanvas = document.getElementById("mycanvas");
        mycontext = mycanvas.getContext("2d");
        mycanvas.width = window.innerWidth;
        mycanvas.height = window.innerHeight;

        mycanvas.addEventListener("mousemove", drawsquare);
        mycanvas.addEventListener("mousedown", enabledrawing);
        mycanvas.addEventListener("mouseup", disabledrawing);

        function enabledrawing() {
          isdrawable = true;
        }

        function disabledrawing() {
          isdrawable = false;
        }

        function drawsquare(e) {
          if (isdrawable) {
            mycontext.beginPath();
            mycontext.fillRect(e.clientX, e.clientY, 20, 20);
            mycontext.fill();
            mycontext.closePath();
          }
        }
      }
    </script>
  </head>
  <body>
    <canvas id="mycanvas"></canvas>
  </body>
</html>
