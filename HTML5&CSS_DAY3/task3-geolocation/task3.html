<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geolocation Selector</title>

    <script src="https://maps.googleapis.com/maps/api/js?libraries=places&key=AIzaSyB90FxtYG_ybAYXGkz0ybkmkboE2nEbezI"></script>

    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }

      .main-frame {
        width: 800px;
        background: linear-gradient(to bottom, #ffe4c4, #fff);
        border: 4px solid #f4a460;
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      }

      .inner-box {
        background: linear-gradient(to bottom, #fffacd, #ffe4b5);
        border: 2px solid #8b4513;
        border-radius: 40px;
        padding: 15px;
        margin-bottom: 20px;
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.1);
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 30px;
      }

      .header-box {
        height: 80px;
      }

      .glossy-btn {
        background: linear-gradient(to bottom, #00bfff, #0000ff);
        border: 2px solid #fff;
        border-radius: 10px;
        color: white;
        font-weight: bold;
        font-size: 16px;
        padding: 8px 30px;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
        text-shadow: 1px 1px 2px black;
        transition: all 0.3s ease;
      }

      .glossy-btn:hover {
        transform: scale(1.05) skew(15deg);
        background: linear-gradient(to bottom, #00ddff, #0044ff);
        box-shadow: 0 0 15px #00bfff;
      }

      .content-box {
        flex-direction: column;
        padding: 40px 20px;
        min-height: 350px;
        position: relative;
      }

      #details-panel {
        background: linear-gradient(135deg, #2f4f4f, #191970);
        border: 2px solid #000;
        border-radius: 25px;
        padding: 20px 40px;
        width: 60%;
        color: white;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        text-align: center;
        display: none;
        transition: transform 0.3s ease;
        cursor: pointer;
      }

      #details-panel:hover {
        transform: translateY(-5px) scale(1.2);
        background: linear-gradient(135deg, #2f4f4f, #7676c4);
      }

      .info-group {
        margin-bottom: 10px;
      }

      .info-label {
        display: block;
        background-color: #9acd32;
        color: #000;
        font-weight: bold;
        padding: 2px 0;
        border-radius: 4px 4px 0 0;
        font-size: 14px;
      }

      .info-value {
        background-color: #b0c4de;
        color: #000;
        font-weight: bold;
        padding: 5px;
        margin: 0;
        border: 1px solid #fff;
        border-radius: 0 0 4px 4px;
        min-height: 25px;
        font-family: monospace;
        font-size: 15px;
      }

      #mymap {
        width: 90%;
        height: 300px;
        border: 4px solid #fff;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        display: none;
      }

      #welcome-msg {
        color: #8b4513;
        font-weight: bold;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <div class="main-frame">
      <div class="inner-box header-box">
        <button class="glossy-btn" id="btnMap">Display Map Only</button>
        <button class="glossy-btn" id="btnDetails">Detailed Info Only</button>
      </div>

      <div class="inner-box content-box">
        <div id="welcome-msg">Please select an option above</div>

        <div id="details-panel">
          <div class="info-group">
            <label class="info-label">Latitude (degree)</label>
            <p class="info-value" id="latVal"></p>
          </div>
          <div class="info-group">
            <label class="info-label">Longitude (degree)</label>
            <p class="info-value" id="lonVal"></p>
          </div>
          <div class="info-group">
            <label class="info-label">Accuracy (m)</label>
            <p class="info-value" id="accVal"></p>
          </div>
          <div class="info-group">
            <label class="info-label">TimeStamp</label>
            <p class="info-value" id="timeVal"></p>
          </div>
        </div>

        <div id="mymap"></div>
      </div>
    </div>

    <script>
      window.addEventListener("load", function () {
        const btnMap = document.getElementById("btnMap");
        const btnDetails = document.getElementById("btnDetails");

        const mapPanel = document.getElementById("mymap");
        const detailsPanel = document.getElementById("details-panel");
        const welcomeMsg = document.getElementById("welcome-msg");

        const latDisplay = document.getElementById("latVal");
        const lonDisplay = document.getElementById("lonVal");
        const accDisplay = document.getElementById("accVal");
        const timeDisplay = document.getElementById("timeVal");

        btnMap.addEventListener("click", function () {
          detailsPanel.style.display = "none";
          welcomeMsg.style.display = "none";
          mapPanel.style.display = "block";

          if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
              showMapPosition,
              errorhandler,
            );
          }
        });

        btnDetails.addEventListener("click", function () {
          mapPanel.style.display = "none";
          welcomeMsg.style.display = "none";
          detailsPanel.style.display = "block";

          if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
              showDetailsPosition,
              errorhandler,
            );
          }
        });

        function showMapPosition(e) {
          let lat = e.coords.latitude;
          let lon = e.coords.longitude;

          var location = new google.maps.LatLng(lat, lon);
          var specs = { zoom: 16, center: location };
          var map = new google.maps.Map(mapPanel, specs);

          new google.maps.Marker({
            position: location,
            map: map,
            title: "You are here",
          });
        }

        function showDetailsPosition(e) {
          let lat = e.coords.latitude;
          let lon = e.coords.longitude;
          let acc = e.coords.accuracy;
          let time = new Date(e.timestamp).toLocaleString();

          latDisplay.innerText = lat + "°";
          lonDisplay.innerText = lon + "°";
          accDisplay.innerText = acc;
          timeDisplay.innerText = time;
        }

        function errorhandler(e) {
          alert("Error retrieving location: " + e.message);
        }
      });
    </script>
  </body>
</html>
