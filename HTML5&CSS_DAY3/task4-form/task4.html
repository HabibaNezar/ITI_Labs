<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Math Project</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f0f0f0;
        font-family: sans-serif;
      }

      .outer-container {
        background-color: #ffff00;
        padding: 40px 60px;
        border-radius: 60px 0 60px 0;
        display: flex;
        gap: 30px;
        border: 2px solid #000;
        box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.1);
      }

      .card {
        padding: 25px;
        border-radius: 25px;
        min-width: 280px;
        box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.2);
      }

      .addition-card {
        background: linear-gradient(to bottom, #8a8a8a, #ff7b5a);
      }

      .multiplication-card {
        background: linear-gradient(to bottom, #8a8a8a, #68ff4d);
      }

      h2 {
        margin-top: 0;
        font-size: 1.1rem;
        letter-spacing: 1px;
      }

      .input-group {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 20px;
      }

      input {
        width: 90px;
        height: 50px;
        border-radius: 10px;
        border: none;
        text-align: center;
        font-size: 1.5rem;
        font-weight: bold;
        box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
      }

      .symbol {
        font-size: 1.5rem;
        font-weight: bold;
      }

      .result-text {
        font-size: 1.5rem;
        font-weight: bold;
        margin-left: 5px;
      }
    </style>
  </head>
  <body>
    <div class="outer-container">
      <div class="card addition-card">
        <h2>ADDITION</h2>
        <div class="input-group">
          <input type="number" id="a1" value="2" oninput="doMath()" />
          <span class="symbol">+</span>
          <input type="number" id="a2" value="5" oninput="doMath()" />
          <span class="result-text">= <span id="resA">7</span></span>
        </div>
      </div>

      <div class="card multiplication-card">
        <h2>MULTIPLICATION</h2>
        <div class="input-group">
          <input type="number" id="m1" value="3" oninput="doMath()" />
          <span class="symbol">*</span>
          <input type="number" id="m2" value="0" oninput="doMath()" />
          <span class="result-text">= <span id="resM">0</span></span>
        </div>
      </div>
    </div>

    <script>
      function doMath() {
        const a1 = parseFloat(document.getElementById("a1").value) || 0;
        const a2 = parseFloat(document.getElementById("a2").value) || 0;
        document.getElementById("resA").innerText = a1 + a2;

        const m1 = parseFloat(document.getElementById("m1").value) || 0;
        const m2 = parseFloat(document.getElementById("m2").value) || 0;
        document.getElementById("resM").innerText = m1 * m2;
      }
    </script>
  </body>
</html>
